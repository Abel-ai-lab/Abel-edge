schema_version: 1
description: >
  Deferred/removal registry for validation metrics, gates, and profile keys that are
  unsupported, unused, or awaiting quantitative justification. Entries here are not
  necessarily removed from runtime yet; Task 1 records candidates visible before remediation.

entries:
  - name: hill_alpha
    type: metric
    status: defer-candidate
    removed_from: []
    reason: Unused diagnostic tail metric with no live gate consumer or public contract.
    required_inputs:
      - pnl lower-tail losses
    reentry_conditions:
      - Quantitative definition and estimator choice documented in audit matrix
      - Runtime consumer and threshold rationale added if promoted to gate
    docs_updated: false

  - name: cvar_var_ratio
    type: metric
    status: defer-candidate
    removed_from: []
    reason: Unused diagnostic ratio with no profile threshold and no public documentation.
    required_inputs:
      - pnl
    reentry_conditions:
      - Explicit contract need documented
      - Baseline tests and threshold policy defined
    docs_updated: false

  - name: pbo
    type: metric
    status: deferred
    removed_from:
      - causal_edge/validation/metrics.py
    reason: Removed from the live payload because a single strategy trade log does not provide the candidate-by-fold structure required for a true PBO calculation.
    required_inputs:
      - candidate strategy set
      - CPCV fold matrix
      - in-sample selection event
      - out-of-sample ranking artifact
    reentry_conditions:
      - External explorer exports candidate-by-fold CPCV artifacts
      - Runtime consumer and threshold semantics are documented and tested
    docs_updated: true

  - name: neg_roll_frac
    type: metric
    status: deferred
    removed_from:
      - causal_edge/validation/metrics.py
    reason: Replaced by direct drawdown-time metrics because rolling-Sharpe heuristics hard-coded window assumptions and short samples defaulted to false stability.
    required_inputs:
      - pnl path
      - explicit rolling-window contract
    reentry_conditions:
      - Rolling stability semantics are redefined and documented
      - Runtime consumer and thresholds are tested
    docs_updated: true

  - name: oos_is
    type: metric
    status: deferred
    removed_from:
      - causal_edge/validation/metrics.py
    reason: Removed from the live payload because a final PnL path does not establish defensible in-sample/out-of-sample provenance.
    required_inputs:
      - pnl
      - explicit train/test or fold boundaries
    reentry_conditions:
      - Runtime receives explicit split metadata rather than inferring halves
      - Re-entry semantics and thresholds are documented and tested
    docs_updated: true

  - name: is_sharpe
    type: metric
    status: deferred
    removed_from:
      - causal_edge/validation/metrics.py
    reason: Removed with the OOS/IS family because split-half Sharpe diagnostics no longer have a live contract consumer.
    required_inputs:
      - pnl
      - explicit train/test or fold boundaries
    reentry_conditions:
      - OOS-style contract is reintroduced with explicit provenance
      - Diagnostic role is documented and tested
    docs_updated: true

  - name: oos_sharpe
    type: metric
    status: deferred
    removed_from:
      - causal_edge/validation/metrics.py
    reason: Removed with the OOS/IS family because split-half Sharpe diagnostics no longer have a live contract consumer.
    required_inputs:
      - pnl
      - explicit train/test or fold boundaries
    reentry_conditions:
      - OOS-style contract is reintroduced with explicit provenance
      - Diagnostic role is documented and tested
    docs_updated: true

  - name: validation.permutation_trials
    type: profile_key
    status: deferred
    removed_from:
      - causal_edge/validation/profiles/equity_daily.yaml
      - causal_edge/validation/profiles/crypto_daily.yaml
      - causal_edge/validation/profiles/hft.yaml
    reason: Consumed by the diagnostic-only bootstrap calculation, but not by any live validation gate or score rule.
    required_inputs:
      - permutation test design
    reentry_conditions:
      - Gate or report contract promoted beyond diagnostic-only status
      - Gate/report semantics defined and tested
    docs_updated: false

  - name: validation.oos_is_min
    type: profile_key
    status: deferred
    removed_from:
      - causal_edge/validation/profiles/equity_daily.yaml
      - causal_edge/validation/profiles/crypto_daily.yaml
      - causal_edge/validation/profiles/hft.yaml
    reason: Orphaned by removal of the T12 OOS/IS gate from the live validation contract.
    required_inputs:
      - explicit OOS/IS metric contract
    reentry_conditions:
      - OOS-style gate is reintroduced with defensible semantics
      - Threshold rationale is documented and tested
    docs_updated: true

  - name: validation.pbo_max
    type: profile_key
    status: deferred
    removed_from:
      - causal_edge/validation/profiles/equity_daily.yaml
      - causal_edge/validation/profiles/crypto_daily.yaml
      - causal_edge/validation/profiles/hft.yaml
    reason: Orphaned by removal of the T7 PBO gate from the live validation contract.
    required_inputs:
