  - name: anti_gaming.max_dd_gate
    type: profile_key
    status: deferred
    removed_from:
      - causal_edge/validation/profiles/equity_daily.yaml
      - causal_edge/validation/profiles/crypto_daily.yaml
      - causal_edge/validation/profiles/hft.yaml
    reason: Removed after unifying MaxDD policy on `validation.max_dd`, which now drives both PASS/FAIL and the KEEP/DISCARD absolute veto.
    required_inputs:
      - max drawdown policy threshold
    reentry_conditions:
      - Product intentionally needs a second MaxDD policy separate from `validation.max_dd`
      - The split semantics are documented and tested end-to-end
    docs_updated: true

  - name: bootstrap_p_gate
    type: gate
    status: deferred
    removed_from:
      - causal_edge/validation/metrics.py
    reason: Removed from live validation because threshold and public/profile contract were unsupported.
    required_inputs:
      - pnl
      - bootstrap methodology
    reentry_conditions:
      - Threshold must be made profile-configurable
      - Public/operator contract and test semantics must be documented
    docs_updated: false

  - name: T7 PBO
    type: gate
    status: deferred
    removed_from:
      - causal_edge/validation/metrics.py
    reason: Removed from live validation because the runtime input contract cannot support a true PBO calculation from a single strategy trade log.
    required_inputs:
      - candidate strategy set
      - CPCV fold matrix
      - selection and out-of-sample ranking artifacts
    reentry_conditions:
