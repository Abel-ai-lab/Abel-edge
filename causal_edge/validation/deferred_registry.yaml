  - name: validation.permutation_p_max
    type: profile_key
    status: deferred
    removed_from:
      - causal_edge/validation/profiles/equity_daily.yaml
      - causal_edge/validation/profiles/crypto_daily.yaml
      - causal_edge/validation/profiles/hft.yaml
    reason: Present in YAML profiles but not consumed by runtime validation logic.
    required_inputs:
      - permutation test outputs
    reentry_conditions:
      - Runtime consumer added
      - Threshold rationale documented
    docs_updated: false

  - name: validation.look_ahead_mag_corr_max
    type: profile_key
    status: deferred
    removed_from:
      - causal_edge/validation/profiles/equity_daily.yaml
      - causal_edge/validation/profiles/crypto_daily.yaml
      - causal_edge/validation/profiles/hft.yaml
    reason: Present in YAML profiles but no runtime look-ahead audit currently consumes it.
