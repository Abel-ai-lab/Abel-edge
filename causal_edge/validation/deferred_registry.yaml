  - name: T13 NegRoll
    type: gate
    status: deferred
    removed_from:
      - causal_edge/validation/metrics.py
    reason: Removed from live validation and replaced by direct drawdown-time gates that operate on underwater bar time rather than rolling-Sharpe heuristics.
    required_inputs:
      - explicit rolling stability contract
    reentry_conditions:
      - Rolling stability gate is redefined and documented
      - Threshold policy is tested
    docs_updated: true

  - name: T12 OOS/IS
    type: gate
    status: deferred
    removed_from:
      - causal_edge/validation/metrics.py
    reason: Removed from live validation because a final PnL path could not justify a true in-sample/out-of-sample gate, and the prior half-split implementation had sign-semantic flaws.
    required_inputs:
      - explicit train/test or fold boundaries
      - documented OOS retention semantics
    reentry_conditions:
      - Split provenance is provided to runtime
      - Gate definition and threshold policy are documented and tested
    docs_updated: true

  - name: T13 MaxDDDuration
    type: gate
    status: deferred
    removed_from:
      - causal_edge/validation/metrics.py
    reason: Removed from the live validation gate because underwater-duration thresholds depend on bar cadence and recovery semantics that are not yet justified as a universal PASS/FAIL contract.
    required_inputs:
      - explicit bar cadence policy
      - recovery-duration contract by profile
    reentry_conditions:
      - Duration threshold semantics are documented per profile cadence
      - Runtime denominator and failure semantics are tested end-to-end
    docs_updated: true

  - name: T13 DrawdownTime
    type: gate
    status: deferred
    removed_from:
      - causal_edge/validation/metrics.py
    reason: Removed from the live validation gate because underwater-time thresholds depend on market structure and bar cadence semantics that are not yet justified as a universal PASS/FAIL contract.
    required_inputs:
      - explicit bar cadence policy
      - underwater-time semantics by profile
    reentry_conditions:
      - Duration-fraction threshold semantics are documented per profile cadence
      - Runtime denominator and failure semantics are tested end-to-end
