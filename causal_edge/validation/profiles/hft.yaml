# Abel Proof profile: HFT (High-Frequency Trading)
# For intraday/tick-level strategies.
# Median inter-row gap < 1 hour triggers auto-detection to this profile.
# Three leverage-invariant dimensions: ratio (Sharpe) × rank (IC) × shape (Omega).

name: hft
description: >
  Profile for high-frequency and intraday strategies. Very tight tolerances.
  DSR K=1000 reflecting large HFT config search space.

metric_triangle:
  optimize: sharpe
  guardrails:
    - {metric: position_ic, tolerance: 0.01}
    - {metric: omega, tolerance: 0.05}

anti_gaming:
  return_floor: 0.05
  sharpe_lo_ratio_max: 5.0       # HFT has minimal serial corr
  position_ic_min: 0.01
  position_ic_stability_min: 0.40

validation:
  calendar_type: intraday
  periods_per_year: 252
  dsr_min: 0.90
  dsr_K: 1000                    # HFT typically explores many configs
  drawdown_time_frac_max: 0.35
  max_drawdown_duration_bars_max: null  # unknown until HFT bar cadence is explicitly contracted
  max_loss_years: 1              # HFT should not have loss years
  lo_adjusted_min: 0.0           # Lo not meaningful for tick data
  omega_min: 1.5
  max_dd: -0.05                  # absolute gate and KEEP/DISCARD veto
